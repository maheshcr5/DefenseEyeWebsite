          "@type": "Question",
          "name": "What is CMMC 2.0 and why do DoD contractors need it?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "CMMC 2.0 (Cybersecurity Maturity Model Certification) is a Department of Defense framework that requires all defense contractors to demonstrate specific cybersecurity practices to protect Controlled Unclassified Information (CUI) and Federal Contract Information (FCI). Starting in 2025, CMMC certification is being phased into all new DoD contracts, making compliance mandatory for contractors who want to continue working with the Department of Defense."
          }
        },
        {
          "@type": "Question",
          "name": "How does CMMC Lens automate CMMC compliance?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "CMMC Lens uses AI-governed automation to streamline the entire CMMC readiness process. It automatically collects evidence from your cloud environments (AWS, Azure, GCC High), maps that evidence to NIST 800-171 controls, generates your System Security Plan (SSP) and Plan of Action & Milestones (POA&M), and continuously monitors your SPRS score. This reduces manual documentation and preparation work by up to 80% — while your team handles the remaining hands-on assessment activities."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between CMMC Level 1 and Level 2?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "CMMC Level 1 requires 17 basic cybersecurity practices focused on protecting Federal Contract Information (FCI) and allows self-assessment. CMMC Level 2 requires all 110 security controls from NIST SP 800-171 to protect Controlled Unclassified Information (CUI) and requires assessment by a Certified Third-Party Assessment Organization (C3PAO). CMMC Lens supports both levels with automated evidence mapping and compliance tracking."
          }
        },
        {
          "@type": "Question",
          "name": "How long does it take to achieve CMMC readiness with DefenseEye?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "With CMMC Lens, most organizations can achieve audit readiness in days rather than the typical 6-12 months required with manual processes. Our AI-driven platform automates evidence collection, control mapping, and documentation generation, reducing documentation and preparation time by up to 80%. The exact timeline depends on your current security posture and target CMMC level — Level 2 still requires hands-on remediation and C3PAO coordination."
          }
        },
        {
          "@type": "Question",
          "name": "Does CMMC Lens help with NIST 800-171 and DFARS compliance?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. CMMC 2.0 Level 2 is directly aligned with NIST SP 800-171 Rev 2, and DFARS clause 252.204-7012 requires contractors to implement these controls. CMMC Lens automatically maps your existing security evidence to all 110 NIST 800-171 controls, identifies gaps, and generates the documentation required for both DFARS compliance and CMMC certification."
          }
        },
        {
          "@type": "Question",
          "name": "What is an SPRS score and how does DefenseEye improve it?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Supplier Performance Risk System (SPRS) score is a numerical representation of your organization's compliance with NIST 800-171 controls, ranging from -203 to 110. DefenseEye's CMMC Lens continuously monitors your security posture and provides real-time SPRS score tracking, identifying specific controls that need attention to maximize your score before assessment."
          }
        }
      ]
    }
