# ─── Nginx Server Block — DefenseEye.ai ──────────────────────────────────────
# Location on VPS: /etc/nginx/sites-available/defenseeye
# Enable with: sudo ln -s /etc/nginx/sites-available/defenseeye /etc/nginx/sites-enabled/
# After Let's Encrypt: certbot --nginx -d defenseeye.ai -d www.defenseeye.ai

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name defenseeye.ai www.defenseeye.ai;

    # Let's Encrypt ACME challenge (certbot needs this)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://defenseeye.ai$request_uri;
    }
}

# ── www → non-www redirect ───────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.defenseeye.ai;

    # SSL certs managed by certbot — will be added automatically
    ssl_certificate     /etc/letsencrypt/live/defenseeye.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/defenseeye.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://defenseeye.ai$request_uri;
}

# ── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name defenseeye.ai;

    # SSL certs managed by certbot
    ssl_certificate     /etc/letsencrypt/live/defenseeye.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/defenseeye.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"              always;
    add_header X-Content-Type-Options     "nosniff"                 always;
    add_header X-XSS-Protection           "1; mode=block"           always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml
        image/svg+xml font/ttf font/woff font/woff2;

    # ── Static files: serve from dist/public with long-lived cache ───────────
    # (Vite hashes all asset filenames so cache-busting is automatic)
    location ~* \.(js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # ── AI / SEO static files — no cache so bots always get fresh content ────
    location ~ ^/(robots\.txt|sitemap\.xml|llms\.txt|\.well-known/.*)$ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        expires            1h;
        add_header         Cache-Control "public";
    }

    # ── API endpoint — no cache ───────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        add_header         Cache-Control "no-store, no-cache";
    }

    # ── All other requests → Express (SPA fallback) ──────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SPA: don't cache HTML responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/defenseeye.access.log;
    error_log  /var/log/nginx/defenseeye.error.log;
}
